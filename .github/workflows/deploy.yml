name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.toastedbytes.com
  IMAGE_NAME: job-hunt-app
  DEPLOY_HOST: 192.168.50.118
  DEPLOY_USER: deploy
  DEPLOY_DIR: /opt/job-hunt

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Login to Nexus
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Compute tag
        id: tag
        run: |
          SHA=${GITHUB_SHA::7}
          echo "tag=main-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: [self-hosted, linux, x64, homelab]
    steps:
      - name: Set up deploy key
        env:
          KEY: ${{ secrets.JOB_HUNT_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          umask 077
          echo "$KEY" > ~/.ssh/job_hunt_deploy
          chmod 600 ~/.ssh/job_hunt_deploy
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pin image tag in remote .env
        env:
          IMG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/job_hunt_deploy "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "sed -i 's|^JOB_HUNT_IMAGE=.*|JOB_HUNT_IMAGE=${IMG}|' ${DEPLOY_DIR}/.env"

      - name: Pull and roll (deploy is in docker group, no sudo needed)
        run: |
          ssh -i ~/.ssh/job_hunt_deploy "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd ${DEPLOY_DIR} && docker compose pull && docker compose up -d"

      - name: Wait for /health
        run: |
          for i in $(seq 1 24); do
            if curl -fsS "http://${DEPLOY_HOST}:3014/health" >/dev/null; then
              echo "Healthy after ${i} attempt(s)"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed"
          exit 1

      - name: Cleanup deploy key
        if: always()
        run: rm -f ~/.ssh/job_hunt_deploy
